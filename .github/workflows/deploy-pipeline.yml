name: Deploy Pipeline Image

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'run.py'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

env:
  IMAGE: asia-northeast1-docker.pkg.dev/marketprobe-automation/pipeline/scripts:latest
  REGION: asia-northeast1
  PROJECT: marketprobe-automation
  JOB_NAME: orchestrate-v2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE -f Dockerfile .
          docker push $IMAGE

      - name: Update Cloud Run Job (force new image pull)
        run: |
          gcloud run jobs update $JOB_NAME \
            --region=$REGION \
            --image=$IMAGE \
            --task-timeout=7200 \
            --quiet
